# Hyperparameter Tuning Configuration for DeepGCN RT Prediction
# Tuning learning rate and loss function only

# Study configuration
study_name: "deepgcn_lr_loss_tuning"
direction: "minimize"
trials: 3
n_jobs: 4
seed: 42

# Training configuration for each trial
epochs_per_trial: 200
early_stop_patience: 30

# Output
output_path: "results/tuning_results_deepgcn.json"

# ============================================================================
# TRAINING HYPERPARAMETERS - TUNED
# ============================================================================

# Learning rate (log scale)
lr_min: 0.00001
lr_max: 0.01

# Loss function - tuned
loss_fn_choices: ["mse", "mae", "huber", "smooth_l1"]

# Huber delta for huber/smooth_l1 loss
huber_delta_min: 0.5
huber_delta_max: 2.0