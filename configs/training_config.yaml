# Training configuration for RT prediction

# Optimization
learning_rate: 0.001
batch_size: 256
num_epochs: 50
optimizer: "adam"
weight_decay: 0.0

# Learning rate scheduling
use_scheduler: false
scheduler_type: "plateau"
scheduler_patience: 10
scheduler_factor: 0.5

# Early stopping
early_stop_patience: 20
monitor_metric: "val/mae"
monitor_mode: "min"

# Checkpointing
checkpoint_dir: "checkpoints"
save_top_k: 3

# Logging
log_dir: "logs"
log_every_n_steps: 10

# Hardware
accelerator: "auto"
devices: "auto"
precision: "32"

# Reproducibility
seed: 42
deterministic: false