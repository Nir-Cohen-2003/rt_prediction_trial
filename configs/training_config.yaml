# Training configuration for RT prediction

# Optimization
learning_rate: 0.001
batch_size: 1024
num_epochs: 300
optimizer: "adam"
weight_decay: 0.0

# Loss function
loss_fn: "huber"
huber_delta: 1.0

# Learning rate scheduling
use_scheduler: true
scheduler_type: "cosine_warmup"
warmup_epochs: 10

# Early stopping
early_stop_patience: 50
monitor_metric: "val/mae"
monitor_mode: "min"

# Checkpointing
checkpoint_dir: "checkpoints"
save_top_k: 3

# Logging
log_dir: "logs"
log_every_n_steps: 10

# Hardware
accelerator: "auto"
devices: "auto"
precision: "32"

# Reproducibility
seed: 42
deterministic: false