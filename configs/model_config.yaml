# Model configuration for RT prediction

model_type: "pyg"  # Options: "chemprop" or "pyg"

# Common settings for ALL models
# message_hidden_dim controls the hidden dimension of GNN layers
# num_layers controls the number of GNN layers
# ffn_hidden_dim controls the width of the final output MLP
# ffn_num_layers controls the number of layers in the final output MLP
message_hidden_dim: 200
num_layers: 8
ffn_hidden_dim: 1024
ffn_num_layers: 2
dropout: 0.0

# Chemprop-specific configuration
chemprop:
  aggregation: "mean"  # Options: "mean", "sum", "norm", "attentive"
  use_chemeleon: false
  chemeleon_checkpoint: null  # Options: "chemeleon_100m", "chemeleon_300m", or path
  freeze_chemeleon: false
  chemeleon_num_layers: null

# PyG-specific configuration
pyg:
  # Node and edge feature dimensions
  node_in_dim: 133  # RDKit default atom features
  edge_in_dim: 14   # RDKit default bond features
  edge_dim: null    # For TransformerConv, defaults to edge_in_dim if None
  
  # Pooling configuration
  pool_type: "attentivefp" 
  pool_ratio: 0.5
  pool_num_heads: 4
  pool_dim_feedforward: 16
  pool_num_timesteps: 2  # Only for AttentiveFP readout
  
  # Generic GNN settings
  gnn_type: "deepgcn"  # Options: "gcn", "gin", "transformer", "deepgcn"
  activation: "relu"  # Options: "relu", "silu", "gelu"
  num_heads: 4  # For transformer
  use_edge_features: true
  
  # DeeperGCN specific settings
  deepgcn:
    norm_type: "layer"  # Options: "batch", "layer", "instance"
    beta: 1.0
    learn_beta: true
    gen_aggr: "softmax"  # Options: "softmax", "power"
    mlp_layers: 1  # Number of MLP layers for GENConv message transformation (not output MLP)