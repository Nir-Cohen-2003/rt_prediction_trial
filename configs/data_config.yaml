# Data configuration for RT prediction

# Input data
raw_data_path: "data/raw/SMRT_dataset.csv"
cid_column: "pubchem"
rt_column: "rt"
inchi_column: "inchi"

# Splitting
split_method: "random"
test_fraction: 0.1
val_fraction: 0.1
random_seed: 42

# Output paths
output_dir: "data/processed"
train_file: "train.parquet"
val_file: "val.parquet"
test_file: "test.parquet"

# Preprocessing
remove_duplicates: true
filter_invalid_inchi: true
min_rt: 400
max_rt: null

# Molecule featurization - applies to BOTH Chemprop and PyG models
# Options: "simple", "v1", "v2", "organic", "rigr"
featurizer_type: "v2"

# SimpleMoleculeFeaturizer options (only used when featurizer_type="simple")
atom_features: true
bond_features: true
atom_descriptors: null  # Options: null, "all", "rdkit_2d", "rdkit_2d_normalized"
bond_descriptors: null  # Options: null, "all"