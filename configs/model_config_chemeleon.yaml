# Model configuration for RT prediction with CheMeleon fine-tuning

model_type: "chemprop"

# Common settings for ALL models
message_hidden_dim: 300
num_layers: 3
ffn_hidden_dim: 64
ffn_num_layers: 2
dropout: 0.1

# Chemprop-specific settings
chemprop:
  aggregation: "mean"
  use_chemeleon: true
  chemeleon_checkpoint: "checkpoints/chemeleon/chemeleon_100m.pt"
  freeze_chemeleon: false
  chemeleon_num_layers: 3