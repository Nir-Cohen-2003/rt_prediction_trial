[workspace]
authors = ["Nir Cohen <nircoh@weizmann.ac.il>"]
channels = ["https://prefix.dev/conda-forge","https://prefix.dev/nir-cohen"]
name = "rt_trial"
platforms = ["linux-64"]
version = "0.1.0"

[system-requirements]
cuda = "12.0"

[tasks]
check-trainer = "ty check src/training/trainer.py"
check-hyperparam = "ty check src/training/hyperparam_tune.py"

train = { cmd = "python -m src.training.trainer --data-config configs/data_config.yaml --model-config configs/model_config.yaml --training-config configs/training_config.yaml --experiment-name rt_baseline", depends-on = ["check-trainer"] }
train-chemeleon = { cmd = "python -m src.training.trainer --data-config configs/data_config.yaml --model-config configs/model_config_chemeleon.yaml --training-config configs/training_config_chemeleon.yaml --experiment-name rt_chemeleon_full --description 'Fine-tuning CheMeleon 100M for RT prediction'", depends-on = ["check-trainer"] }
train-chemeleon-frozen = { cmd = "python -m src.training.trainer --data-config configs/data_config.yaml --model-config configs/model_config_chemeleon_frozen.yaml --training-config configs/training_config_chemeleon.yaml --experiment-name rt_chemeleon_frozen --description 'Training only the prediction head on frozen CheMeleon encoder'", depends-on = ["check-trainer"] }
tune = { cmd = "python -m src.training.hyperparam_tune --data-config configs/data_config.yaml --model-config configs/model_config.yaml --tuning-config configs/hyperparameter_tuning.yaml", depends-on = ["check-hyperparam"] }
tune-chemeleon = { cmd = "python -m src.training.hyperparam_tune --data-config configs/data_config.yaml --model-config configs/model_config_chemeleon.yaml --tuning-config configs/hyperparameter_tuning_chemeleon.yaml", depends-on = ["check-hyperparam"] }

[dependencies]
python = "3.12.*"

chemprop = ">=2.2.1,<3"
polars = ">=1.33.1,<2"

optuna = "*"
lightning = "*"
python-lmdb = "*"

pytorch-gpu = ">=2.7.0"
cuda-version = "12.6.*"
pytorch_geometric = ">=2.6.1"
pyyaml = "*"
[pypi-dependencies]
jax = {version = "*", extras = ["cuda12"]}
ty = "*"